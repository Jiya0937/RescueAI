<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RescueAI - Complete Your Profile</title>
  <meta name="description" content="Optionally complete your emergency health profile and emergency contacts.">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Global & Setup Styles -->
  <link rel="stylesheet" href="../css/index.css">
  <link rel="stylesheet" href="../css/profile-setup.css">

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="setup-body">

  <div class="setup-wrapper">
    <div class="setup-card">

      <!-- Top Header & Skip Bar -->
      <div class="setup-top-bar">
        <div class="setup-brand">
          <i data-lucide="shield-alert" class="brand-icon"></i>
          <span>RescueAI Profile Setup</span>
        </div>
        <button type="button" class="btn-skip-setup" id="btn-skip-all">
          <span>Skip All</span>
          <i data-lucide="fast-forward"></i>
        </button>
      </div>

      <!-- Main Heading -->
      <h1 class="setup-main-title">Complete Your Profile</h1>
      <p class="setup-main-subtitle">Adding emergency and medical details helps responders assist you faster in critical situations.</p>

      <!-- Progress Meter -->
      <div class="setup-progress-box">
        <div class="progress-info-row">
          <span class="progress-label" id="step-name-label">Step 1: Personal Details</span>
          <span class="progress-pct" id="progress-pct-text">20% Complete</span>
        </div>
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="progress-bar-fill" style="width: 20%;"></div>
        </div>
      </div>

      <!-- Step Indicator Dots -->
      <div class="setup-steps-indicator">
        <div class="step-dot active" id="dot-1">1</div>
        <div class="step-line"></div>
        <div class="step-dot" id="dot-2">2</div>
        <div class="step-line"></div>
        <div class="step-dot" id="dot-3">3</div>
        <div class="step-line"></div>
        <div class="step-dot" id="dot-4">4</div>
      </div>

      <!-- STEP 1: Personal Details -->
      <div class="setup-step-view active" id="setup-step-1">
        <h2 class="step-title"><i data-lucide="user"></i> Personal Details</h2>
        <div class="setup-form-grid">
          <div class="setup-field">
            <label>Phone Number</label>

            <input type="tel" id="setup-phone" placeholder="+1 (555) 000-0000">
          </div>
          <div class="setup-field">
            <label>Date of Birth</label>
            <input type="date" id="setup-dob">
          </div>
          <div class="setup-field">
            <label>Gender</label>
            <select id="setup-gender">
              <option value="">Select Gender</option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="setup-field">
            <label>City & Country</label>
            <input type="text" id="setup-city" placeholder="e.g. New York, USA">
          </div>
        </div>

        <div class="setup-actions">
          <button type="button" class="btn-step-skip" onclick="nextStep(2)">
            <span>Skip Step</span>
            <i data-lucide="arrow-right"></i>
          </button>
          <button type="button" class="btn-step-next" onclick="saveAndNext(1, 2)">
            <span>Continue</span>
            <i data-lucide="arrow-right"></i>
          </button>
        </div>
      </div>


      <!-- STEP 2: Medical Info -->
      <div class="setup-step-view" id="setup-step-2">
        <h2 class="step-title"><i data-lucide="heart-pulse"></i> Medical Profile</h2>
        <div class="setup-form-grid">
          <div class="setup-field">
            <label>Blood Group</label>
            <select id="setup-blood-group">
              <option value="">Select Blood Group</option>
              <option value="A+">A+</option>
              <option value="A-">A-</option>
              <option value="B+">B+</option>
              <option value="B-">B-</option>
              <option value="O+">O+</option>
              <option value="O-">O-</option>
              <option value="AB+">AB+</option>
              <option value="AB-">AB-</option>
            </select>
          </div>
          <div class="setup-field">
            <label>Height & Weight</label>
            <input type="text" id="setup-height-weight" placeholder="e.g. 175 cm / 70 kg">
          </div>
          <div class="setup-field full-width">
            <label>Known Allergies (if any)</label>
            <input type="text" id="setup-allergies" placeholder="e.g. Penicillin, Peanuts, Dust">
          </div>
          <div class="setup-field full-width">
            <label>Current Conditions / Diseases</label>
            <input type="text" id="setup-diseases" placeholder="e.g. Asthma, Diabetes, Hypertension">
          </div>
        </div>

        <div class="setup-actions">
          <button type="button" class="btn-step-skip" onclick="nextStep(3)">
            <span>Skip Step</span>
            <i data-lucide="arrow-right"></i>
          </button>
          <button type="button" class="btn-step-next" onclick="saveAndNext(2, 3)">
            <span>Continue</span>
            <i data-lucide="arrow-right"></i>
          </button>
        </div>
      </div>


      <!-- STEP 3: Emergency Contacts -->
      <div class="setup-step-view" id="setup-step-3">
        <h2 class="step-title"><i data-lucide="phone-call"></i> Emergency Contact #1</h2>
        <div class="setup-form-grid">
          <div class="setup-field">
            <label>Contact Name</label>
            <input type="text" id="setup-contact1-name" placeholder="Full Name">
          </div>
          <div class="setup-field">
            <label>Relationship</label>
            <input type="text" id="setup-contact1-rel" placeholder="e.g. Parent, Spouse, Sibling">
          </div>
          <div class="setup-field full-width">
            <label>Phone Number</label>
            <input type="tel" id="setup-contact1-phone" placeholder="+1 (555) 123-4567">
          </div>
        </div>

        <div class="setup-actions">
          <button type="button" class="btn-step-skip" onclick="nextStep(4)">
            <span>Skip Step</span>
            <i data-lucide="arrow-right"></i>
          </button>
          <button type="button" class="btn-step-next" onclick="saveAndNext(3, 4)">
            <span>Continue</span>
            <i data-lucide="arrow-right"></i>
          </button>
        </div>
      </div>


      <!-- STEP 4: Hospital & Preferences -->
      <div class="setup-step-view" id="setup-step-4">
        <h2 class="step-title"><i data-lucide="building-2"></i> Hospital & Preferences</h2>
        <div class="setup-form-grid">
          <div class="setup-field full-width">
            <label>Preferred Hospital</label>
            <input type="text" id="setup-hospital" placeholder="e.g. City General Hospital">
          </div>
          <div class="setup-field">
            <label>Preferred Language</label>
            <select id="setup-language">
              <option value="en">English</option>
              <option value="hi">Hindi (हिंदी)</option>
              <option value="mr">Marathi (मराठी)</option>
            </select>
          </div>
        </div>

        <div class="setup-actions">
          <button type="button" class="btn-step-skip" onclick="finishSetup()">
            <span>Skip & Finish</span>
            <i data-lucide="check-circle"></i>
          </button>
          <button type="button" class="btn-step-next" onclick="finishSetup()">
            <span>Finish Setup</span>
            <i data-lucide="check-circle"></i>
          </button>
        </div>
      </div>

    </div>
  </div>

  <script src="../js/profile-setup.js"></script>
</body>
</html>
